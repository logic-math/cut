# cut-config.yaml — AI Service Provider Configuration
# Edit this file to switch providers for each service type.

# ─────────────────────────────────────────────────────────
# pipeline: 选择视频生成方式
#   manim   — 默认。Manim CE 动画 + edge-tts 配音。
#             效果最好，适合知识讲解类视频。需要 ~/manim-env。
#   ffmpeg  — 传统方式。Pexels/Pixabay 素材 + FFmpeg 合成。
#             适合快速出片，依赖素材库。
# ─────────────────────────────────────────────────────────
pipeline: manim

# ─────────────────────────────────────────────────────────
# Manim Pipeline 配置（pipeline: manim 时生效）
# ─────────────────────────────────────────────────────────
manim:
  # Python 解释器路径（必须是安装了 manim 的 venv）
  python: "~/manim-env/bin/python3.12"
  # manim CLI 路径
  cli: "~/manim-env/bin/manim"
  # 渲染质量: l(ow)/m(edium)/h(igh)/k(4K)
  quality: h
  # 背景色（Manim 颜色名或 hex）
  background_color: "#0D1117"
  # 默认字体（中文必须指定支持 CJK 的字体）
  font: "STHeiti"
  # 代码风格颜色
  accent_color: "#58A6FF"
  code_color: "#00FF41"
  warn_color: "#F0883E"

# ─────────────────────────────────────────────────────────
# TTS 配置（两种 pipeline 均使用）
# ─────────────────────────────────────────────────────────
tts:
  provider: fish_audio  # fish_audio | edge_tts | openai | elevenlabs | azure

  # ── Fish Audio 配置（推荐，音质最高，支持音色克隆）──
  # API Key: 从 fish.audio 获取，或设置 FISH_AUDIO_API_KEY 环境变量
  fish_audio_api_key: "5289a0af24a04410b4b6096d448a93e7"
  # 音色 ID: fish.audio 上的声音模型 ID（支持自己克隆的音色）
  fish_audio_voice_id: "03d333b7dc1d4010a63865225dfa4683"
  # 模型: s2-pro（最强）| speech-1.6 | speech-1.5
  fish_audio_model: "s2-pro"
  # MP3 码率: 64 | 128 | 192
  fish_audio_mp3_bitrate: 192

  # ── edge-tts 配置（免费备用）──
  voice: zh-CN-YunxiNeural        # 男声，适合知识讲解
  # voice: zh-CN-XiaoxiaoNeural   # 女声
  # voice: zh-CN-YunyangNeural    # 新闻男声

  # ── OpenAI TTS 配置 ──
  openai_voice: alloy

  # ── ElevenLabs 配置 ──
  elevenlabs_voice_id: ""

  # ── Azure 配置 ──
  azure_voice: zh-CN-YunxiNeural

# ─────────────────────────────────────────────────────────
# FFmpeg Pipeline 配置（pipeline: ffmpeg 时生效）
# ─────────────────────────────────────────────────────────
image_generation:
  provider: dalle3  # dalle3 | stable_diffusion | stability_ai
  dalle3_model: dall-e-3
  dalle3_size: 1792x1024
  dalle3_quality: standard
  stability_engine: stable-diffusion-xl-1024-v1-0

video_generation:
  provider: runway  # runway | kling_fal
  runway_model: gen3a_turbo
  runway_duration: 5
  kling_model: kling-video/v1/standard/text-to-video

stock_video:
  providers:
    - pexels
    - pixabay
  pexels_per_page: 10
  pexels_orientation: landscape
  pixabay_per_page: 10
  pixabay_video_type: film

stock_image:
  providers:
    - pexels
    - pixabay
  pexels_per_page: 10
  pexels_orientation: landscape
  pixabay_per_page: 10
  pixabay_image_type: photo

music:
  providers:
    - jamendo
    - pixabay
  fallback_generation: musicgen
  jamendo_limit: 10
  musicgen_model: facebook/musicgen-small
  musicgen_duration: 30

handraw:
  chart_provider: svg
  chart_llm_model: gpt-4o
  chart_output_format: png
  chart_dpi: 150
  illustration_provider: dalle3
  illustration_style_prompt: "hand-drawn illustration style, sketch, black and white line art, educational diagram"
  illustration_size: 1792x1024

# ─────────────────────────────────────────────────────────
# 输出配置
# ─────────────────────────────────────────────────────────
output:
  default_format: mp4
  default_resolution: 1920x1080
  default_fps: 24
  ffmpeg_codec_video: libx264
  ffmpeg_codec_audio: aac
  ffmpeg_crf: 23
